services:
  - type: web
    name: svu-backend
    env: node
    rootDir: BackEnd
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this secret in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this secret in Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false # Set this to your frontend URL in Render dashboard
